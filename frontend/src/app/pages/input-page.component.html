<div class="interview-page" [class.interview-page--initial]="isInitialState()">
  <header class="interview-topbar">
    <a class="interview-logo" routerLink="/" aria-label="Back to Afaq landing page">
      <app-afaq-logo></app-afaq-logo>
    </a>

    <div class="interview-progress" [attr.aria-label]="progressText()">
      <span class="sr-only">{{ progressText() }}</span>
      <span
        *ngFor="let step of progressSteps(); trackBy: trackByIndex"
        class="interview-progress__dot"
        [class.interview-progress__dot--done]="step.isDone"
        [class.interview-progress__dot--active]="step.isActive"
      ></span>
    </div>
  </header>

  <main class="interview-shell" aria-label="Afaq guided interview">
    <section #thread class="interview-thread">
      <p class="interview-intro" *ngIf="isInitialState()">
        Let&rsquo;s turn uncertainty into direction.
      </p>

      <div
        *ngFor="let message of visibleMessages(); trackBy: trackByIndex"
        class="interview-message"
        [ngClass]="{
          'interview-message--assistant': message.role === 'assistant',
          'interview-message--user': message.role === 'user',
          'interview-message--question': message.tone === 'question',
          'interview-message--thinking': message.tone === 'thinking'
        }"
      >
        <p>{{ message.content }}</p>
      </div>
    </section>

    <footer class="interview-composer" aria-label="Answer composer">
      <div class="interview-composer__inner">
        <div class="interview-input-wrap" [class.interview-input-wrap--busy]="isBusy()">
          <textarea
            [value]="answer()"
            [disabled]="isBusy()"
            (input)="answer.set($any($event.target).value); localError.set(null)"
            placeholder="Reply naturally..."
            aria-label="Your answer"
            rows="1"
          ></textarea>

          <button
            type="button"
            class="interview-send"
            [disabled]="isBusy()"
            (click)="sendAnswer()"
            aria-label="Send answer"
          >
            <span class="sr-only">{{ isBusy() ? 'Afaq is thinking' : 'Send answer' }}</span>
            <svg aria-hidden="true" viewBox="0 0 20 20" focusable="false">
              <path d="M10 15.5V4.8"></path>
              <path d="M5.8 8.9 10 4.7l4.2 4.2"></path>
            </svg>
          </button>
        </div>

        <p class="interview-error" *ngIf="displayedError() as message">{{ message }}</p>
      </div>
    </footer>
  </main>
</div>
