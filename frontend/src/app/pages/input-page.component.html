<div class="analysis-page">
  <main class="analysis-page__main dynamic-interview">
    <section class="analysis-intro dynamic-interview__hero">
      <div class="container dynamic-interview__hero-inner">
        <span class="analysis-intro__label">DYNAMIC AI INTERVIEW</span>
        <h1 class="analysis-intro__title">
          <span class="analysis-intro__title-line">One question at a time.</span>
          <span class="analysis-intro__title-line">Each next question depends on your answer.</span>
        </h1>
        <p class="analysis-intro__copy">
          The assistant asks a single question, reads your answer, then generates the next one
          using the backend agent flow.
        </p>
      </div>
    </section>

    <section class="container dynamic-interview__panel-wrap">
      <article class="dynamic-interview__panel panel surface-card">
        <p class="dynamic-interview__step">Current question</p>

        <p class="dynamic-interview__question" *ngIf="question() as q">
          {{ q }}
        </p>

        <p class="dynamic-interview__question" *ngIf="!question()">
          Preparing your first question...
        </p>

        <label class="dynamic-interview__label" for="answer">
          Your answer
        </label>

        <textarea
          id="answer"
          class="analysis-textarea dynamic-interview__textarea"
          [value]="answer()"
          [disabled]="isBusy()"
          (input)="answer.set($any($event.target).value)"
          placeholder="Write your answer here..."
        ></textarea>

        <div class="dynamic-interview__errors" *ngIf="chatError() || submitError()">
          <p class="field-error" *ngIf="chatError() as error">{{ error }}</p>
          <p class="field-error" *ngIf="submitError() as error">{{ error }}</p>
        </div>

        <div class="dynamic-interview__actions">
          <button
            class="btn btn--secondary"
            type="button"
            [disabled]="isBusy()"
            (click)="startInterview()"
          >
            Restart
          </button>

          <button
            class="btn btn--green"
            type="button"
            [disabled]="isBusy() || !answer().trim()"
            (click)="nextQuestion()"
          >
            <span *ngIf="!isBusy()">Next</span>
            <span *ngIf="isBusy()">Thinking...</span>
          </button>
        </div>
      </article>
    </section>
  </main>
</div>
