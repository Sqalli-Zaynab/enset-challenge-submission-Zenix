<svg
  width="100%"
  viewBox="0 0 340 90"
  xmlns="http://www.w3.org/2000/svg"
  role="img"

      stroke-width="2"

      <circle r="7" fill="#ffffff" stroke="#EF9F27" stroke-width="2" />

      fill="none"
      stroke="#7F77DD"
      stroke-width="1"
      stroke-dasharray="3 4"
      stroke-linecap="round"

    />

    <g transform="translate(37 41)">
      <circle cx="8" cy="4.8" r="4.8" [attr.fill]="'url(#' + figureGradientId + ')'" />
      <rect
        x="4.2"
        y="10"
        width="9"
        height="14"

      />
      <path
        d="M5.4 13.5 C 2.8 15.4, 1.8 18.1, 1.2 21.5"
        fill="none"
        stroke="#AFA9EC"

        fill="none"
        stroke="#8880D8"
        stroke-width="2.2"
        stroke-linecap="round"

      <circle
        r="10.5"
        fill="none"
        stroke="#1D9E75"
        stroke-width="2"
        stroke-dasharray="3 4"
      />

        d="M-4.6 -4.6 L4.6 4.6 M4.6 -4.6 L-4.6 4.6"
        fill="none"
        stroke="#1D9E75"
        stroke-width="2.2"
        stroke-linecap="round"
      />
    </g>

  <g transform="translate(106 0)">
    <text
      x="0"
      y="44"
      [attr.fill]="wordmarkColor"
      font-family="Inter, system-ui, sans-serif"
      font-size="46"
      font-weight="900"
      letter-spacing="-1.5"
    >
      Afaq
    </text>
    <text
      x="0"
      y="66"
      [attr.fill]="taglineColor"
      font-family="Inter, system-ui, sans-serif"
      font-size="10"
      font-weight="700"
      letter-spacing="3.5"

      AI CAREER GUIDANCE
